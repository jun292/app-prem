<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cek Invoice | ACCPREM</title>
    
    <meta name="description" content="Lacak status pembelian akun premium kamu di ACCPREM dengan mudah menggunakan ID Invoice.">
    <link rel="icon" type="image/png" href="http://upload-image-ten.vercel.app/78e7d6.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; color: #0f172a; min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
        
        .bg-accent { position: absolute; top: 0; left: 0; right: 0; height: 350px; background: linear-gradient(180deg, #f3e8ff 0%, rgba(255,255,255,0) 100%); z-index: -1; pointer-events: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #f1f5f9; position: sticky; top: 0; z-index: 40; }
        
        .main-box { background: white; border: 1px solid #e2e8f0; border-radius: 28px; padding: 2rem; width: 100%; max-width: 500px; margin: 2rem auto; box-shadow: 0 20px 40px -10px rgba(147, 51, 234, 0.05); animation: modalPopIn 0.4s ease-out; }
        
        .custom-input { width: 100%; background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 16px; padding: 1rem 1.2rem; color: #1e293b; outline: none; transition: 0.2s; font-size: 1rem; text-align: center; letter-spacing: 1px; font-family: monospace; font-weight: bold; }
        .custom-input:focus { border-color: #a855f7; box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1); background: white; }
        
        .btn-primary { width: 100%; background: linear-gradient(135deg, #9333ea 0%, #a855f7 100%); color: white; font-weight: 700; padding: 1rem; border-radius: 16px; transition: 0.3s; box-shadow: 0 10px 25px -5px rgba(147, 51, 234, 0.4); display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 35px -5px rgba(147, 51, 234, 0.5); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .hidden-view { display: none !important; }
        .animate-fade { animation: fadeUp 0.4s ease-out forwards; }
        
        /* Modals & Custom Alerts */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 9999; padding: 1rem; }
        .modal-card { background: white; border: 1px solid #e2e8f0; border-radius: 28px; padding: 1.5rem; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); animation: modalPopIn 0.3s cubic-bezier(0.2, 0, 0, 1); }
        @keyframes modalPopIn { 0% { opacity: 0; transform: scale(0.9) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Status Badges */
        .badge-status { padding: 4px 12px; border-radius: 20px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; display: inline-flex; align-items: center; gap: 4px; }
        .status-paid { background: #dcfce7; color: #10b981; border: 1px solid #bbf7d0; }
        .status-pending { background: #fef9c3; color: #f59e0b; border: 1px solid #fde047; }
        .status-failed { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; }
        .status-processing { background: #e0e7ff; color: #3b82f6; border: 1px solid #bfdbfe; }
    </style>
</head>
<body>

    <div class="bg-accent"></div>

    <nav class="glass-nav">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='/'">
                <img src="http://upload-image-ten.vercel.app/78e7d6.png" alt="ACCPREM" class="w-9 h-9 rounded-xl object-cover shadow-sm">
                <span class="text-xl font-extrabold bg-gradient-to-r from-purple-700 to-fuchsia-600 bg-clip-text text-transparent tracking-tight">ACCPREM</span>
            </div>
            <button onclick="window.location.href='/'" class="w-9 h-9 flex items-center justify-center bg-white border border-slate-200 text-slate-600 hover:text-purple-600 hover:border-purple-200 rounded-xl transition-all shadow-sm" title="Kembali ke Home">
                <i class="fas fa-home"></i>
            </button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8 w-full flex-1 flex flex-col items-center justify-center">
        
        <div class="text-center mb-6 animate-fade">
            <div class="w-16 h-16 bg-purple-50 text-purple-600 rounded-2xl mx-auto flex items-center justify-center text-2xl border border-purple-100 mb-4 shadow-sm">
                <i class="fas fa-search-location"></i>
            </div>
            <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-900 tracking-tight">Lacak Pesananmu</h1>
            <p class="text-sm text-slate-500 mt-2">Masukkan ID Invoice untuk melihat status akun kamu.</p>
        </div>

        <div class="main-box w-full !mt-0 !mb-8" id="searchBox">
            <form onsubmit="trackOrder(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wide text-left ml-1">ID Invoice (Contoh: INV123...)</label>
                    <input type="text" id="invoiceInput" class="custom-input uppercase" placeholder="Ketik nomor invoice..." required autocomplete="off">
                </div>
                <button type="submit" class="btn-primary" id="btnTrack">
                    <i class="fas fa-search"></i> Cek Status Pesanan
                </button>
            </form>
        </div>

        <div id="resultView" class="main-box w-full hidden-view animate-fade !mt-0 !pt-6">
            <div class="flex justify-between items-start mb-6 border-b border-slate-100 pb-4 text-left">
                <div>
                    <div class="text-xs font-bold text-purple-600 tracking-wide mb-1" id="resInvoice">#INV</div>
                    <div class="text-xs text-slate-500 flex items-center gap-1"><i class="far fa-clock"></i> <span id="resTime">Waktu</span></div>
                </div>
                <div id="resStatusBadge" class="badge-status status-pending">
                    <i class="fas fa-circle-notch fa-spin"></i> PENDING
                </div>
            </div>

            <div class="flex items-center gap-4 mb-6 bg-slate-50 border border-slate-100 rounded-2xl p-4 text-left">
                <div class="w-12 h-12 rounded-xl bg-white text-purple-500 flex items-center justify-center text-xl shrink-0 border border-slate-200 shadow-sm">
                    <i class="fas fa-box-open"></i>
                </div>
                <div class="flex-1">
                    <h3 class="font-bold text-slate-800 text-sm" id="resName">Nama Produk</h3>
                    <p class="text-xs text-slate-500 mt-1" id="resQty">Qty: 1 Pcs</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">TOTAL</p>
                    <p class="font-extrabold text-purple-600" id="resPrice">Rp0</p>
                </div>
            </div>

            <div id="resMessage" class="text-sm text-slate-600 bg-blue-50 border border-blue-100 p-4 rounded-xl mb-6 text-left leading-relaxed">
                Silakan selesaikan pembayaran agar pesanan diproses otomatis.
            </div>

            <div id="accountContainer" class="hidden-view">
                <div class="flex items-center gap-2 mb-3 mt-2">
                    <i class="fas fa-key text-purple-500 text-sm"></i>
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">DATA AKUN PREMIUM</span>
                </div>
                <div id="accountList" class="space-y-3 text-left">
                    </div>
                <p class="text-[9px] text-center text-slate-400 italic mt-4">*Tekan ikon copy warna ungu untuk menyalin data dengan aman.</p>
            </div>

            <button onclick="resetSearch()" class="w-full mt-6 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3.5 rounded-xl transition text-sm flex justify-center items-center gap-2">
                <i class="fas fa-redo"></i> Cek Invoice Lain
            </button>
        </div>

    </div>

    <div id="customModalOverlay" class="modal-overlay">
        <div class="modal-card">
            <div id="customModalIcon" class="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl"></div>
            <h3 id="customModalTitle" class="text-xl font-bold text-slate-800 mb-2">Title</h3>
            <div id="customModalMessage" class="text-slate-500 text-sm leading-relaxed mb-6">Message</div>
            <div id="customModalActions" class="flex gap-3"></div>
        </div>
    </div>

    <script>
        // ================= CUSTOM ALERT SYSTEM =================
        function showLoadingAlert(title, msg) {
            const overlay = document.getElementById('customModalOverlay');
            document.getElementById('customModalTitle').innerText = title;
            document.getElementById('customModalMessage').innerHTML = msg;
            const icon = document.getElementById('customModalIcon');
            icon.className = "w-14 h-14 rounded-full mx-auto mb-4 text-2xl bg-purple-100 text-purple-500 flex items-center justify-center";
            icon.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>'; 
            document.getElementById('customModalActions').innerHTML = ''; 
            overlay.style.display = 'flex';
        }

        function showCustomAlert(type, title, message) {
            const overlay = document.getElementById('customModalOverlay');
            document.getElementById('customModalTitle').innerText = title;
            document.getElementById('customModalMessage').innerHTML = message; 
            const icon = document.getElementById('customModalIcon');
            
            if(type==='success') { icon.className="w-14 h-14 rounded-full mx-auto mb-4 text-2xl bg-emerald-100 text-emerald-500 flex items-center justify-center"; icon.innerHTML='<i class="fas fa-check"></i>'; }
            else if(type==='error') { icon.className="w-14 h-14 rounded-full mx-auto mb-4 text-2xl bg-red-100 text-red-500 flex items-center justify-center"; icon.innerHTML='<i class="fas fa-times"></i>'; }
            else { icon.className="w-14 h-14 rounded-full mx-auto mb-4 text-2xl bg-purple-100 text-purple-500 flex items-center justify-center"; icon.innerHTML='<i class="fas fa-info"></i>'; }
            
            document.getElementById('customModalActions').innerHTML = `<button onclick="closeCustomModal()" class="w-full bg-slate-900 text-white hover:bg-slate-800 font-bold py-3 rounded-xl text-sm transition">Tutup</button>`;
            overlay.style.display = 'flex';
        }

        function closeCustomModal() { document.getElementById('customModalOverlay').style.display = 'none'; }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            showCustomAlert('success', 'Berhasil Disalin', 'Data akun telah disalin ke clipboard.');
        }

        // ================= TRACKING LOGIC =================
        async function trackOrder(e) {
            e.preventDefault();
            const invoiceInput = document.getElementById('invoiceInput').value.trim();
            if(!invoiceInput) return;

            const btn = document.getElementById('btnTrack');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Mencari Data...';
            btn.disabled = true;

            showLoadingAlert('Mencari Invoice', 'Sistem sedang memverifikasi pesanan kamu...');

            try {
                // Tembak API Backend untuk cari invoice
                const res = await axios.post('/api/app/track', { invoice: invoiceInput });
                closeCustomModal();

                if(res.data.success) {
                    renderTrackingResult(res.data.data);
                } else {
                    throw new Error(res.data.message || "Invoice tidak ditemukan.");
                }
            } catch (err) {
                closeCustomModal();
                showCustomAlert('error', 'Tidak Ditemukan', err.response?.data?.message || err.message);
            } finally {
                btn.innerHTML = '<i class="fas fa-search"></i> Cek Status Pesanan';
                btn.disabled = false;
            }
        }

        function renderTrackingResult(data) {
            document.getElementById('searchBox').classList.add('hidden-view');
            document.getElementById('resultView').classList.remove('hidden-view');

            document.getElementById('resInvoice').innerText = '#' + data.invoice;
            
            // Format waktu ISO ke lokal ID
            const orderDate = new Date(data.createdAt);
            document.getElementById('resTime').innerText = orderDate.toLocaleString("id-ID", { timeZone: "Asia/Jakarta" }) + ' WIB';
            
            document.getElementById('resName').innerText = data.product_name;
            document.getElementById('resQty').innerText = `Qty: ${data.qty} Pcs`;
            document.getElementById('resPrice').innerText = 'Rp' + data.amount.toLocaleString('id-ID');

            // Handle Status & Pesan
            const badge = document.getElementById('resStatusBadge');
            const msgBox = document.getElementById('resMessage');
            const accContainer = document.getElementById('accountContainer');
            const accList = document.getElementById('accountList');

            accContainer.classList.add('hidden-view'); // Sembunyikan default

            if(data.status === 'paid' || data.status === 'success') {
                badge.className = 'badge-status status-paid';
                badge.innerHTML = '<i class="fas fa-check-circle"></i> SUKSES';
                msgBox.className = 'text-sm text-emerald-700 bg-emerald-50 border border-emerald-100 p-4 rounded-xl mb-6 text-left';
                msgBox.innerHTML = 'Pesanan kamu telah lunas dan akun berhasil di-generate. Silakan simpan detail di bawah ini.';
                
                // Render Akun
                if(data.accounts && data.accounts.length > 0) {
                    let html = '';
                    data.accounts.forEach((acc, i) => {
                        html += `
                            <div class="bg-white border border-slate-100 rounded-xl overflow-hidden shadow-sm mb-3">
                                <div class="bg-slate-50 border-b border-slate-100 px-3 py-2 flex justify-between items-center">
                                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">ITEM #${i+1}</span>
                                </div>
                                <div class="p-3">
                                    <div class="mb-3">
                                        <span class="block text-[10px] font-bold text-slate-400 uppercase mb-1">USERNAME / EMAIL</span>
                                        <div class="flex items-center justify-between border border-slate-200 rounded-lg p-2 bg-slate-50">
                                            <span class="font-mono text-sm text-slate-700 truncate mr-2">${acc.username || acc.email}</span>
                                            <button onclick="copyText('${acc.username || acc.email}')" class="w-8 h-8 rounded-md bg-purple-100 text-purple-600 hover:bg-purple-200 flex items-center justify-center transition shrink-0"><i class="fas fa-copy text-sm"></i></button>
                                        </div>
                                    </div>
                                    <div>
                                        <span class="block text-[10px] font-bold text-slate-400 uppercase mb-1">PASSWORD / AKSES</span>
                                        <div class="flex items-start justify-between border border-slate-200 rounded-lg p-2 bg-slate-50">
                                            <span class="font-mono text-sm text-slate-700 break-all mr-2 mt-1 line-clamp-3">${acc.password || '-'}</span>
                                            <button onclick="copyText('${acc.password}')" class="w-8 h-8 rounded-md bg-slate-200 text-slate-500 hover:bg-slate-300 flex items-center justify-center transition shrink-0"><i class="fas fa-copy text-sm"></i></button>
                                        </div>
                                    </div>
                                </div>
                            </div>`;
                    });
                    accList.innerHTML = html;
                    accContainer.classList.remove('hidden-view');
                }

            } else if (data.status === 'processing') {
                badge.className = 'badge-status status-processing';
                badge.innerHTML = '<i class="fas fa-sync-alt fa-spin"></i> PROSES';
                msgBox.className = 'text-sm text-blue-700 bg-blue-50 border border-blue-100 p-4 rounded-xl mb-6 text-left';
                msgBox.innerHTML = 'Pembayaran telah diterima. Server sedang meracik akun kamu. Silakan refresh (cek lagi) dalam beberapa menit.';
            } else if (data.status === 'canceled' || data.status === 'failed') {
                badge.className = 'badge-status status-failed';
                badge.innerHTML = '<i class="fas fa-times-circle"></i> BATAL';
                msgBox.className = 'text-sm text-red-700 bg-red-50 border border-red-100 p-4 rounded-xl mb-6 text-left';
                msgBox.innerHTML = 'Transaksi ini telah dibatalkan atau gagal diproses. Silakan buat pesanan baru di halaman katalog.';
            } else {
                // Pending
                badge.className = 'badge-status status-pending';
                badge.innerHTML = '<i class="fas fa-clock"></i> PENDING';
                msgBox.className = 'text-sm text-amber-700 bg-amber-50 border border-amber-100 p-4 rounded-xl mb-6 text-left';
                msgBox.innerHTML = 'Pesanan ini belum dibayar. Jika kamu merasa sudah transfer, silakan hubungi Admin dengan melampirkan bukti transfer.';
            }
        }

        function resetSearch() {
            document.getElementById('invoiceInput').value = '';
            document.getElementById('resultView').classList.add('hidden-view');
            document.getElementById('searchBox').classList.remove('hidden-view');
        }

        // Jika URL ada query ?inv=INV123... otomatis cari
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const inv = urlParams.get('inv');
            if(inv) {
                document.getElementById('invoiceInput').value = inv;
                document.getElementById('btnTrack').click();
            }
        }
    </script>
</body>
</html>
